services:
  app:
    build: .
    # This service uses the default ENTRYPOINT from the Dockerfile
    # which is: ["python", "-m", "video2mdnotes.main"]
    command: ["--help"]
    volumes:
      - ./previous_run_results:/app/previous_run_results
      - ./model_cache:/root/.cache
    env_file:
      - .env

  api:
    build: .
    # We override the default entrypoint from the Dockerfile
    # to run the uvicorn server instead of the CLI app.
    entrypoint: ["uvicorn", "video2mdnotes.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./previous_run_results:/app/previous_run_results
      - ./model_cache:/root/.cache
    env_file:
      - .env
